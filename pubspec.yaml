name: kalis
description: "卡莉絲（Kalis）— 團隊產品輔助 App；含 Photo Compare 前後對比拼接、作品庫與教學影片等（MVP）"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  image: ^4.3.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  youtube_player_flutter: ^9.1.1
  share_plus: ^10.1.4
  intl: ^0.20.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
